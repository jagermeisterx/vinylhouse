{% extends "base.html" %}

{% block content %}
<h1 class="mb-4">{{ accion }} producto</h1>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% for field in form %}
        <div class="mb-3">
            {{ field.label_tag }}
            {{ field }}
            {% if field.errors %}
                <div class="text-danger">{{ field.errors }}</div>
            {% endif %}
        </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary">{{ accion }} producto</button>
    <a href="{% url 'admin_product_list' %}" class="btn btn-outline-secondary">Cancelar</a>
</form>
{% endblock %}
